<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROMPT QUEST — A Arte de Perguntar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0a;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'VT323', monospace;
  overflow: hidden;
}

/* CRT effect */
.crt::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.08) 0px,
    rgba(0,0,0,0.08) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  z-index: 999;
}

.crt::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%);
  pointer-events: none;
  z-index: 999;
}

/* Scanline animation */
@keyframes scan {
  0% { top: -100%; }
  100% { top: 100%; }
}

.scanline {
  position: fixed;
  left: 0;
  width: 100%;
  height: 4px;
  background: rgba(0, 255, 200, 0.04);
  z-index: 1000;
  pointer-events: none;
  animation: scan 4s linear infinite;
}

#game {
  position: relative;
  z-index: 1;
  width: 780px;
  max-width: 96vw;
  background: #0d1117;
  border: 3px solid #00ffc8;
  border-radius: 4px;
  padding: 24px 28px;
  box-shadow:
    0 0 30px rgba(0,255,200,0.08),
    inset 0 0 60px rgba(0,0,0,0.6);
}

/* Terminal header */
.terminal-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-bottom: 14px;
  border-bottom: 2px solid #00ffc8;
  margin-bottom: 18px;
}

.terminal-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: #00ffc8;
  box-shadow: 0 0 8px rgba(0,255,200,0.4);
  animation: blink 1s step-end infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}

.terminal-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  color: #00ffc8;
  letter-spacing: 2px;
  text-shadow: 0 0 10px rgba(0,255,200,0.3);
}

.terminal-sub {
  font-family: 'VT323', monospace;
  font-size: 13px;
  color: rgba(0,255,200,0.25);
  margin-left: auto;
  letter-spacing: 1px;
}

/* Screen container */
.screen {
  min-height: 380px;
  position: relative;
}

/* BOOT SCREEN */
.boot-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 360px;
  gap: 20px;
}

.boot-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 18px;
  color: #00ffc8;
  text-shadow: 0 0 20px rgba(0,255,200,0.3);
  text-align: center;
  line-height: 1.6;
}

.boot-sub {
  font-size: 18px;
  color: rgba(0,255,200,0.5);
  text-align: center;
}

.boot-prompt {
  font-size: 16px;
  color: rgba(0,255,200,0.3);
  animation: pulse-text 2s ease-in-out infinite;
}

@keyframes pulse-text {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.8; }
}

.boot-btn {
  margin-top: 10px;
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  padding: 14px 40px;
  background: transparent;
  border: 2px solid #00ffc8;
  color: #00ffc8;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
  letter-spacing: 2px;
}

.boot-btn:hover {
  background: rgba(0,255,200,0.1);
  box-shadow: 0 0 30px rgba(0,255,200,0.15);
}

/* PROGRESS BAR */
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
  padding: 6px 0;
}

.progress-bar {
  flex: 1;
  height: 12px;
  background: rgba(0,255,200,0.06);
  border: 1px solid rgba(0,255,200,0.15);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #00ffc8, #00ff88);
  border-radius: 2px;
  transition: width 0.5s ease;
  box-shadow: 0 0 10px rgba(0,255,200,0.2);
}

.progress-text {
  font-size: 16px;
  color: rgba(0,255,200,0.5);
  min-width: 80px;
  text-align: right;
  letter-spacing: 1px;
}

/* SCORE */
.score-display {
  font-size: 16px;
  color: #00ffc8;
  text-align: center;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.score-display .num {
  font-size: 22px;
  color: #ffdd00;
  text-shadow: 0 0 10px rgba(255,221,0,0.3);
}

/* QUESTION */
.question-area {
  padding: 8px 0;
}

.question-number {
  font-size: 14px;
  color: rgba(0,255,200,0.25);
  margin-bottom: 6px;
  letter-spacing: 1px;
}

.question-text {
  font-size: 20px;
  color: #e0e8ff;
  line-height: 1.5;
  margin-bottom: 22px;
  padding: 12px 14px;
  background: rgba(0,255,200,0.02);
  border-left: 3px solid rgba(0,255,200,0.15);
  border-radius: 2px;
}

/* OPTIONS */
.options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.option {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 16px;
  background: rgba(0,255,200,0.02);
  border: 1px solid rgba(0,255,200,0.08);
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s ease;
  font-size: 17px;
  color: #c0c8d4;
}

.option:hover:not(.disabled) {
  background: rgba(0,255,200,0.06);
  border-color: rgba(0,255,200,0.2);
}

.option .marker {
  width: 22px; height: 22px;
  border: 2px solid rgba(0,255,200,0.15);
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  color: rgba(0,255,200,0.15);
  flex-shrink: 0;
}

.option.selected .marker {
  border-color: #00ffc8;
  color: #00ffc8;
  background: rgba(0,255,200,0.08);
}

.option.correct {
  border-color: #00ff80 !important;
  background: rgba(0,255,128,0.05) !important;
}

.option.correct .marker {
  border-color: #00ff80 !important;
  color: #00ff80 !important;
  background: rgba(0,255,128,0.1) !important;
}

.option.wrong {
  border-color: #ff4060 !important;
  background: rgba(255,64,96,0.05) !important;
}

.option.wrong .marker {
  border-color: #ff4060 !important;
  color: #ff4060 !important;
  background: rgba(255,64,96,0.1) !important;
}

.option.disabled {
  cursor: default;
  opacity: 0.6;
}

/* FEEDBACK */
.feedback {
  margin-top: 16px;
  padding: 14px 16px;
  border-radius: 2px;
  font-size: 17px;
  line-height: 1.5;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.feedback.correct {
  background: rgba(0,255,128,0.04);
  border: 1px solid rgba(0,255,128,0.12);
  color: #80ffb0;
}

.feedback.wrong {
  background: rgba(255,64,96,0.04);
  border: 1px solid rgba(255,64,96,0.12);
  color: #ff8090;
}

.feedback .fb-label {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.feedback .fb-tip {
  color: rgba(255,255,255,0.3);
  font-size: 15px;
  margin-top: 4px;
}

/* NEXT BUTTON */
.next-btn-wrap {
  margin-top: 16px;
  text-align: center;
}

.next-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  padding: 12px 32px;
  background: transparent;
  border: 2px solid #00ffc8;
  color: #00ffc8;
  cursor: pointer;
  border-radius: 2px;
  letter-spacing: 1px;
  transition: all 0.2s;
}

.next-btn:hover {
  background: rgba(0,255,200,0.08);
  box-shadow: 0 0 20px rgba(0,255,200,0.1);
}

/* RESULT SCREEN */
.result-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 360px;
  gap: 14px;
  text-align: center;
}

.result-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 22px;
  letter-spacing: 3px;
  margin-bottom: 4px;
}

.result-title.grade-0 { color: #ff4060; text-shadow: 0 0 30px rgba(255,64,96,0.3); }
.result-title.grade-1 { color: #ff8040; text-shadow: 0 0 30px rgba(255,128,64,0.3); }
.result-title.grade-2 { color: #ffdd00; text-shadow: 0 0 30px rgba(255,221,0,0.3); }
.result-title.grade-3 { color: #00ffc8; text-shadow: 0 0 30px rgba(0,255,200,0.3); }

.result-score {
  font-size: 48px;
  color: #ffdd00;
  text-shadow: 0 0 20px rgba(255,221,0,0.2);
  font-family: 'Press Start 2P', monospace;
}

.result-msg {
  font-size: 22px;
  color: rgba(0,255,200,0.5);
  max-width: 400px;
  line-height: 1.4;
  margin: 6px 0;
}

.result-detail {
  font-size: 15px;
  color: rgba(255,255,255,0.15);
  margin-top: 4px;
}

.result-btn {
  margin-top: 14px;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  padding: 14px 36px;
  background: transparent;
  border: 2px solid #00ffc8;
  color: #00ffc8;
  cursor: pointer;
  border-radius: 2px;
  letter-spacing: 1px;
  transition: all 0.2s;
}

.result-btn:hover {
  background: rgba(0,255,200,0.08);
  box-shadow: 0 0 20px rgba(0,255,200,0.1);
}

/* Footer */
.footer {
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid rgba(0,255,200,0.04);
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: rgba(0,255,200,0.08);
}

/* Responsive */
@media (max-width: 600px) {
  #game { padding: 16px 14px; }
  .terminal-title { font-size: 8px; }
  .boot-title { font-size: 12px; }
  .question-text { font-size: 16px; padding: 10px; }
  .option { font-size: 14px; padding: 10px 12px; }
  .result-title { font-size: 16px; }
  .result-score { font-size: 36px; }
  .score-display .num { font-size: 18px; }
}

/* Sound toggle */
.sound-toggle {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 1000;
  background: rgba(0,255,200,0.03);
  border: 1px solid rgba(0,255,200,0.06);
  color: rgba(0,255,200,0.15);
  font-size: 18px;
  padding: 6px 10px;
  cursor: pointer;
  border-radius: 2px;
  font-family: 'VT323', monospace;
}

</style>
</head>
<body class="crt">
<div class="scanline"></div>

<button class="sound-toggle" id="sound-btn">🔊 SOM</button>

<div id="game">
  <div class="terminal-header">
    <span class="terminal-dot"></span>
    <span class="terminal-title">PROMPT QUEST v1.0</span>
    <span class="terminal-sub">_ A ARTE DE PERGUNTAR _</span>
  </div>

  <div class="screen" id="screen">
    <!-- Boot Screen -->
    <div class="boot-screen" id="boot-screen">
      <div class="boot-title">
        PROMPT QUEST
      </div>
      <div class="boot-sub">
        ◆ Domine a arte de perguntar ◆
      </div>
      <div class="boot-prompt" id="boot-prompt">
        &gt; AGUARDE INICIALIZAÇÃO...
      </div>
      <button class="boot-btn" id="start-btn">[ INICIAR ]</button>
    </div>
  </div>

  <div class="footer">
    <span>▲ 10 PERGUNTAS</span>
    <span>▼ APRENDA PROMPTS</span>
  </div>
</div>

<script>
// ============================================================
// PROMPT QUEST — Game Engine
// ============================================================

const QUESTIONS = [
  {
    q: 'O que é mais importante ao criar um prompt para uma IA?',
    opts: [
      'Ser vago para dar "liberdade criativa" à IA',
      'Ser específico e claro sobre o que se deseja',
      'Usar palavras difíceis e técnicas',
      'Escrever o mínimo possível de texto',
    ],
    correct: 1,
    explain: 'Ser específico reduz ambiguidades. A IA não adivinha — ela responde com base no que você escreve. Quanto mais claro, melhor o resultado.',
  },
  {
    q: 'Qual destes prompts é MAIS eficaz para gerar um código?',
    opts: [
      '"Me ajuda com um código aí"',
      '"Faz algo de programação para mim"',
      '"Escreva uma função em Python que valide CPF com dígitos verificadores"',
      '"Preciso de um código rápido"',
    ],
    correct: 2,
    explain: 'Quanto mais específico, melhor. Informar linguagem, funcionalidade e regras dá à IA o contexto necessário para um resultado útil.',
  },
  {
    q: 'O que significa "few-shot prompting"?',
    opts: [
      'Prompts que duram poucos segundos',
      'Fornecer exemplos no prompt para guiar o formato da resposta',
      'Usar pouquíssimas palavras no prompt',
      'Um tipo de ataque de segurança em IA',
    ],
    correct: 1,
    explain: 'Few-shot é dar 1 ou mais exemplos no prompt. A IA aprende o padrão pelos exemplos e reproduz o formato desejado.',
  },
  {
    q: 'O que é "chain-of-thought" (cadeia de pensamento)?',
    opts: [
      'Pedir para a IA raciocinar passo a passo antes de responder',
      'Fazer várias perguntas ao mesmo tempo no mesmo prompt',
      'Usar apenas palavras-chave sem frases completas',
      'Ignorar completamente o histórico da conversa',
    ],
    correct: 0,
    explain: 'Chain-of-thought leva a IA a "pensar em voz alta", reduzindo erros em lógica, matemática e raciocínio complexo.',
  },
  {
    q: 'Por que é importante definir o "tom" ou "estilo" em um prompt?',
    opts: [
      'Não faz diferença — a IA decide o tom sozinha',
      'Porque orienta a IA sobre o formato adequado para a audiência',
      'Só é relevante em prompts em inglês',
      'Para ocupar mais tokens no contexto',
    ],
    correct: 1,
    explain: 'Definir tom (formal, informal, técnico) e audiência direciona a IA a produzir conteúdo adequado ao seu público.',
  },
  {
    q: 'Qual a melhor forma de corrigir uma resposta inadequada da IA?',
    opts: [
      'Reiniciar a conversa do zero e tentar de novo',
      'Dar feedback específico, explicando exatamente o que ajustar',
      'Ignorar e fazer uma pergunta completamente diferente',
      'Digitar o prompt de novo com letras maiúsculas',
    ],
    correct: 1,
    explain: 'Feedback direto no mesmo chat é eficiente: "isso está próximo, mas ajuste X para Y". A IA usa o contexto imediato para refinar.',
  },
  {
    q: 'O que significa dar um "prompt negativo"?',
    opts: [
      'Escrever o prompt de forma grosseira ou rude',
      'Especificar o que a IA NÃO deve fazer ou incluir na resposta',
      'Um prompt que propositalmente causa erro na IA',
      'Pedir para a IA ser pessimista sobre o assunto',
    ],
    correct: 1,
    explain: '"Não use jargão técnico" ou "evite listas" são exemplos. Negativos bem colocados eliminam ruídos e direcionam a resposta.',
  },
  {
    q: 'Qual a utilidade de fornecer contexto em prompts complexos?',
    opts: [
      'Aumentar a quantidade de tokens gastos',
      'Ajudar a IA a entender o cenário e gerar respostas mais precisas',
      'Não faz diferença — a IA sempre entende tudo',
      'Apenas para prompts com mais de 100 palavras',
    ],
    correct: 1,
    explain: 'Contexto é tudo. Se você não conta à IA qual é o cenário, o público, o objetivo, ela responde no escuro.',
  },
  {
    q: 'Como pediria para a IA explicar um conceito complexo para uma criança?',
    opts: [
      '"Explique isso aí"',
      '"Simplifica para mim"',
      '"Explique [conceito] com analogias simples e exemplos do dia a dia para uma criança de 10 anos"',
      '"Traduz isso em palavras fáceis"',
    ],
    correct: 2,
    explain: 'Especificar audiência (criança de 10 anos), formato (analogias, exemplos) e nível de complexidade produz explicações realmente acessíveis.',
  },
  {
    q: 'Qual destas estratégias ajuda a obter respostas MAIS CRIATIVAS da IA?',
    opts: [
      'Usar prompts curtos de 1 ou 2 palavras',
      'Pedir múltiplas opções e estimular variações ("sugira 3 ideias diferentes")',
      'Repetir a mesma pergunta várias vezes seguidas',
      'Usar CAPS LOCK em palavras-chave',
    ],
    correct: 1,
    explain: 'Pedir variações ("me dê 3 opções", "pense fora da caixa") ativa o modo criativo da IA. Estimular quantidade gera diversidade.',
  },
];

// ============================================================
// AUDIO (synthesis)
// ============================================================
let audioCtx = null;
let soundEnabled = true;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playBeep(freq, duration, type) {
  if (!soundEnabled) return;
  try {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'square';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function playCorrect() {
  playBeep(784, 0.12, 'square');
  setTimeout(() => playBeep(988, 0.12, 'square'), 100);
  setTimeout(() => playBeep(1175, 0.2, 'square'), 200);
}

function playWrong() {
  playBeep(200, 0.15, 'sawtooth');
  setTimeout(() => playBeep(160, 0.25, 'sawtooth'), 120);
}

function playClick() {
  playBeep(600, 0.06, 'square');
}

function playStart() {
  const notes = [262, 330, 392, 523];
  notes.forEach((n, i) => {
    setTimeout(() => playBeep(n, 0.15, 'square'), i * 120);
  });
}

function playFinish() {
  const notes = [523, 659, 784, 1047];
  notes.forEach((n, i) => {
    setTimeout(() => playBeep(n, 0.2, 'square'), i * 150);
  });
}

// ============================================================
// GAME STATE
// ============================================================
let state = {
  phase: 'boot',   // boot | playing | result
  current: 0,
  score: 0,
  answered: false,
  correctAnswer: null,
};

const screenEl = document.getElementById('screen');

// ============================================================
// RENDER
// ============================================================
function render() {
  switch (state.phase) {
    case 'boot': renderBoot(); break;
    case 'playing': renderQuestion(); break;
    case 'result': renderResult(); break;
  }
}

function renderBoot() {
  screenEl.innerHTML = `
    <div class="boot-screen" id="boot-screen">
      <div class="boot-title">
        PROMPT QUEST
      </div>
      <div class="boot-sub">
        ◆ Domine a arte de perguntar ◆
      </div>
      <div class="boot-prompt" id="boot-prompt">
        &gt; ${getRandomPrompt()}
      </div>
      <button class="boot-btn" id="start-btn">[ INICIAR ]</button>
    </div>
  `;

  // Typing effect on boot prompt
  const prompts = [
    'AGUARDE INICIALIZAÇÃO...',
    'CARREGANDO MÓDULO DE PROMPTS...',
    'SISTEMA PRONTO.',
    'VOCÊ ESTÁ CONECTADO.',
    'BEM-VINDO, OPERADOR.',
  ];
  let idx = 0;
  const el = document.getElementById('boot-prompt');
  if (el) {
    setInterval(() => {
      idx = (idx + 1) % prompts.length;
      el.textContent = '> ' + prompts[idx];
    }, 2000);
  }

  document.getElementById('start-btn').addEventListener('click', () => {
    playStart();
    startGame();
  });
}

function getRandomPrompt() {
  const msgs = [
    'AGUARDE INICIALIZAÇÃO...',
    'CARREGANDO MÓDULO DE PROMPTS...',
    'SISTEMA PRONTO.',
  ];
  return msgs[Math.floor(Math.random() * msgs.length)];
}

function renderQuestion() {
  const q = QUESTIONS[state.current];
  const total = QUESTIONS.length;
  const pct = ((state.current) / total) * 100;
  const labels = ['A', 'B', 'C', 'D'];

  let feedbackHTML = '';
  if (state.answered) {
    const isCorrect = state.correctAnswer === true;
    const cls = isCorrect ? 'correct' : 'wrong';
    const label = isCorrect ? '✓ CORRETO' : '✗ INCORRETO';
    feedbackHTML = `
      <div class="feedback ${cls}">
        <div class="fb-label">${label}</div>
        ${q.explain}
      </div>
      <div class="next-btn-wrap">
        <button class="next-btn" id="next-btn">[ ${state.current < total - 1 ? 'PRÓXIMA' : 'VER RESULTADO'} ]</button>
      </div>
    `;
  }

  screenEl.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
      <span class="progress-text">${state.current+1}/${total}</span>
    </div>
    <div class="score-display">
      PONTOS: <span class="num">${state.score}</span>
    </div>
    <div class="question-area">
      <div class="question-number">PERGUNTA #${state.current + 1} // ${q.q.length > 50 ? 'PROMPTS' : 'ESTRATÉGIA'}</div>
      <div class="question-text">${q.q}</div>
      <div class="options" id="options">
        ${q.opts.map((opt, i) => `
          <div class="option${state.answered ? ' disabled' : ''}" data-idx="${i}">
            <span class="marker">${labels[i]}</span>
            <span>${opt}</span>
          </div>
        `).join('')}
      </div>
      ${feedbackHTML}
    </div>
  `;

  // Highlight correct/wrong after answering
  if (state.answered) {
    const optEls = document.querySelectorAll('.option');
    optEls.forEach((el, i) => {
      if (i === q.correct) el.classList.add('correct');
      if (state.correctAnswer !== true && state.selectedOption === i && i !== q.correct) {
        el.classList.add('wrong');
      }
    });
  }

  // Bind option clicks
  if (!state.answered) {
    document.querySelectorAll('.option').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx);
        handleAnswer(idx);
      });
    });
  } else {
    const nextBtn = document.getElementById('next-btn');
    if (nextBtn) {
      nextBtn.addEventListener('click', () => {
        playClick();
        nextQuestion();
      });
    }
  }
}

function handleAnswer(idx) {
  if (state.answered) return;
  state.answered = true;
  state.selectedOption = idx;

  const q = QUESTIONS[state.current];
  const isCorrect = idx === q.correct;
  state.correctAnswer = isCorrect;

  if (isCorrect) {
    state.score++;
    playCorrect();
  } else {
    playWrong();
  }

  render();
}

function renderResult() {
  const total = QUESTIONS.length;
  const grade = getGrade(state.score);

  playFinish();

  let gradeClass = 'grade-0';
  let titleText = 'PRECISA MELHORAR';
  let msg = 'Você pode ir além! Reflita como constrói seus prompts.';
  if (state.score >= 3 && state.score <= 5) {
    gradeClass = 'grade-1';
    titleText = 'MUITO BOM!';
    msg = 'Você já tem uma boa base. Continue praticando!';
  } else if (state.score >= 6 && state.score <= 8) {
    gradeClass = 'grade-2';
    titleText = 'EXCELENTE!';
    msg = 'Você sabe se comunicar com IA. Continue assim!';
  } else if (state.score >= 9) {
    gradeClass = 'grade-3';
    titleText = 'PERFEITO, PARABÉNS!';
    msg = 'Você domina a arte de perguntar. Espalhe esse conhecimento!';
  }

  screenEl.innerHTML = `
    <div class="result-screen">
      <div class="result-title ${gradeClass}">${titleText}</div>
      <div class="result-score">${state.score}/${total}</div>
      <div class="result-msg">${msg}</div>
      <div class="result-detail">◆ 10 perguntas sobre prompts ◆</div>
      <button class="result-btn" id="restart-btn">[ JOGAR NOVAMENTE ]</button>
    </div>
  `;

  document.getElementById('restart-btn').addEventListener('click', () => {
    playClick();
    startGame();
  });
}

function getGrade(score) {
  if (score <= 2) return 0;
  if (score <= 5) return 1;
  if (score <= 8) return 2;
  return 3;
}

// ============================================================
// GAME FLOW
// ============================================================
function startGame() {
  state = {
    phase: 'playing',
    current: 0,
    score: 0,
    answered: false,
    correctAnswer: null,
    selectedOption: null,
  };
  render();
}

function nextQuestion() {
  state.current++;
  state.answered = false;
  state.correctAnswer = null;
  state.selectedOption = null;

  if (state.current >= QUESTIONS.length) {
    state.phase = 'result';
  }
  render();
}

// ============================================================
// SOUND TOGGLE
// ============================================================
document.getElementById('sound-btn').addEventListener('click', () => {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('sound-btn');
  btn.textContent = soundEnabled ? '🔊 SOM' : '🔇 MUDO';
  if (soundEnabled) playClick();
});

// ============================================================
// INIT
// ============================================================
render();
</script>
</body>
</html>
